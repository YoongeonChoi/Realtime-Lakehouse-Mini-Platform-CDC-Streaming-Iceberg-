services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: rlmp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: rlmp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:16
    container_name: rlmp-postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commerce}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: rlmp-schema-registry
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "8081:8081"

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: rlmp-connect
    depends_on:
      - kafka
      - postgres
      - schema-registry
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      REST_ADVERTISED_HOST_NAME: connect
      PLUGIN_PATH: /kafka/connect,/debezium-connector-postgres
    ports:
      - "8083:8083"

  minio:
    image: minio/minio:latest
    container_name: rlmp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      default:
        aliases:
          - warehouse.minio
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: rlmp-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
    command:
      - "until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio12345}; do sleep 2; done; mc mb --ignore-existing local/warehouse; mc anonymous set none local/warehouse;"

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: rlmp-iceberg-rest
    depends_on:
      - minio-init
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio12345}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "8181:8181"

  trino:
    image: trinodb/trino:460
    container_name: rlmp-trino
    depends_on:
      - iceberg-rest
    ports:
      - "8080:8080"
    volumes:
      - ./infra/trino/etc:/etc/trino:ro

  flink-jobmanager:
    build:
      context: ./infra/flink
    container_name: rlmp-flink-jobmanager
    depends_on:
      - kafka
      - schema-registry
      - minio-init
      - iceberg-rest
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    hostname: jobmanager
    ports:
      - "8082:8081"
    volumes:
      - ./infra/flink/sql:/opt/flink/sql:ro
      - flink_state:/opt/flink/state

  flink-taskmanager:
    build:
      context: ./infra/flink
    container_name: rlmp-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - flink_state:/opt/flink/state

  superset:
    build:
      context: ./infra/superset
    container_name: rlmp-superset
    depends_on:
      - trino
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me-before-sharing}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home

  event-producer:
    build:
      context: ./apps/event-producer
    container_name: rlmp-event-producer
    depends_on:
      - kafka
      - schema-registry
    profiles:
      - tools
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TOPIC: raw.event.commerce.user_behavior_v3
      EVENT_INTERVAL_MS: 500
    volumes:
      - ./apps/event-producer:/app:ro

  dq:
    build:
      context: ./quality
    container_name: rlmp-dq
    depends_on:
      - trino
    profiles:
      - tools
    environment:
      TRINO_SQLALCHEMY_URL: trino://trino@trino:8080/iceberg
    volumes:
      - ./:/workspace

volumes:
  postgres_data:
  minio_data:
  superset_home:
  flink_state:
